# QStorePrice — OpenEnv environment manifest (compatible with openenv-core
# >= 0.2.0). OpenEnv is used here as the deployment / contract layer that
# powers the Hugging Face Space hosting the live demo for our submission to
# **The Gemma 4 Good Hackathon** (Impact Track: Global Resilience, Special
# Technology Track: Unsloth).
# Validated by `openenv push` and consumed by the Hugging Face Space build.

name: qstoreprice
version: "1.1.0"
description: >
  Gemma-4-powered perishable goods intelligence environment. A Gemma 4
  model writes structured Operating Briefs every 2 simulated hours; a
  deterministic rule executor converts the DIRECTIVE section into typed
  pricing/farmer/trend actions. Episodes are 7 simulated days (672 ticks
  at 15-minute resolution). Unified metric: Weekly Waste Recovery Rate
  (WRR) = revenue recovered from at-risk inventory / cost of at-risk
  inventory. Submission for The Gemma 4 Good Hackathon.

author: "QStorePrice Team"
license: MIT
homepage: "https://github.com/nandeshkanagaraju/QStorePrice"

# OpenEnv server: FastAPI app produced by core.env_server.create_fastapi_app.
# Endpoints exposed: GET /health, POST /reset, POST /step, GET /state, WS /ws,
# GET /docs, GET /web — the canonical OpenEnv HTTP/WebSocket contract.
type: space
runtime: fastapi
app: server.app:app
port: 8000

# Typed action / observation / state classes (OpenEnv "Type-Safe by Design"
# pattern — define data structures with Python dataclasses and have the
# server validate every payload against them). These are re-exported at
# top-level by ``models.py`` so clients import them via
# ``from models import BriefAction, ...``.
environment:
  class: freshprice_env.openenv_adapter.FreshPriceOpenEnv
  entry_point: freshprice_env.openenv_adapter:FreshPriceOpenEnv
  action_class: models:BriefAction
  observation_class: models:BriefObservation
  state_class: models:FreshPriceState
  client_class: client:QStorePriceEnv

# The legacy gym-style env is still available for in-process training loops
# (training/train.py, eval/evaluator.py); the OpenEnv adapter delegates to it.
gym_environment:
  class: freshprice_env.freshprice_env.FreshPriceEnv
  entry_point: freshprice_env.freshprice_env:FreshPriceEnv

observation_space:
  type: text
  max_length: 16384
  description: >
    Structured prompt string describing inventory state, expiry urgency,
    active farmer offers, active trend signals, and task instructions.

action_space:
  type: text
  max_length: 4096
  description: >
    Raw Operating Brief text with 6 sections — SITUATION, SIGNAL ANALYSIS,
    VIABILITY CHECK, RECOMMENDATION, DIRECTIVE (JSON), CONFIDENCE.

# Reward is a per-brief delta of WRR with rich component breakdown (r1, r2,
# r3) plus a brief-quality scorer that is independent of WRR — a rich,
# informative reward signal that supports both SFT warm-start and DPO/GRPO
# fine-tuning of the Gemma 4 policy.
reward:
  type: float
  range: [-inf, 1.0]
  rubric:
    - name: r1_pricing
      description: Pricing engine reward — discount timing vs expiry urgency
      weight: 0.5
    - name: r2_farmer
      description: Farmer offer reward — viability-aware accept/counter/decline
      weight: 0.3
    - name: r3_trend
      description: Trend engine reward — restock decisions on viral signals
      weight: 0.2
    - name: brief_quality
      description: Independent scorer of brief reasoning quality (anti-gaming)
      weight: 0.0  # informational only; does not enter WRR
  description: >
    Per-brief reward is the WRR delta this cycle. Episode reward is the
    final WRR from the accumulator. Component rewards (r1/r2/r3) are
    composable rubrics — see freshprice_env/reward.py.

engines:
  - name: Dynamic Pricing
    description: Auto-discount items as expiry approaches
    reward_component: r1_pricing
  - name: Farmer Offer Engine
    description: Accept/counter/decline farmer offers with risk management
    reward_component: r2_farmer
  - name: Social Trend Engine
    description: Detect viral signals, restock before demand arrives
    reward_component: r3_trend

curriculum:
  levels: 5
  scenarios:
    - STABLE_WEEK
    - BUSY_WEEKEND
    - FARMER_WEEK
    - TREND_WEEK
    - CRISIS_WEEK
  promotion_threshold: 0.70
  promotion_window: 5

tags:
  - gemma-4
  - gemma-4-good-hackathon
  - global-resilience
  - food-waste
  - unsloth
  - perishable-goods
  - quick-commerce
  - multi-engine
  - operating-brief
  - curriculum-learning
  - wrr
  - openenv
  - llm-agent
